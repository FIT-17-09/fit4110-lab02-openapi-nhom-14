openapi: 3.1.0
info:
  title: Smart Campus – Camera Stream → AI Vision
  version: 1.0.0
  description: |
    API contract giữa Camera Stream (Consumer) và AI Vision (Provider).
    Camera gửi frame/image khi phát hiện motion, AI Vision trả kết quả detect.
  contact:
    name: FIT4110 Nhom 14
    email: fit4110@example.edu.vn

servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: https://api.campus.local
    description: Class network placeholder

tags:
  - name: health
    description: Kiểm tra trạng thái service
  - name: vision
    description: AI Vision detection endpoints

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái service
      description: Endpoint kiểm tra service AI Vision còn hoạt động.
      tags: [health]
      security: []
      responses:
        '200':
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: ai-vision-service
                    time: '2026-05-17T08:00:00Z'

  /vision/detect:
    post:
      operationId: detectObjects
      summary: Gửi frame để AI Vision phân tích
      description: |
        Camera gửi ảnh dạng base64 hoặc URL khi phát hiện motion.
        AI Vision trả về kết quả detect đồng bộ.
      tags: [vision]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetectRequest'
            examples:
              base64Image:
                value:
                  cameraId: CAM-001
                  imageSource:
                    sourceType: BASE64
                    data: /9j/4AAQSkZJRgAB...
                    mimeType: image/jpeg
                  correlationId: corr-abc-001
                  timestamp: '2026-05-17T08:00:00Z'
              urlImage:
                value:
                  cameraId: CAM-002
                  imageSource:
                    sourceType: URL
                    url: https://storage.campus.local/frames/frame-001.jpg
                  correlationId: corr-abc-002
                  timestamp: '2026-05-17T08:01:00Z'
      responses:
        '200':
          description: Kết quả phân tích ảnh
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectResponse'
              examples:
                detected:
                  value:
                    detectionId: det-0001-uuid
                    cameraId: CAM-001
                    objects:
                      - label: person
                        confidence: 0.95
                        boundingBox:
                          x: 10
                          y: 20
                          width: 100
                          height: 200
                    riskLevel: HIGH
                    note: null
                    processedAt: '2026-05-17T08:00:01Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vision/detections/{detectionId}:
    get:
      operationId: getDetectionById
      summary: Lấy kết quả detect theo ID
      description: Truy vấn chi tiết kết quả detection theo detectionId đã trả về trước đó.
      tags: [vision]
      parameters:
        - $ref: '#/components/parameters/DetectionId'
      responses:
        '200':
          description: Chi tiết kết quả detect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vision/models/info:
    get:
      operationId: getModelInfo
      summary: Lấy thông tin model AI đang dùng
      description: Trả về thông tin model AI Vision hiện tại, version và danh sách nhãn hỗ trợ.
      tags: [vision]
      responses:
        '200':
          description: Thông tin model AI Vision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelInfo'
              examples:
                info:
                  value:
                    modelId: yolov8-campus-v2
                    version: 2.1.0
                    supportedLabels:
                      - person
                      - vehicle
                      - fire
                    lastUpdated: '2026-04-01T00:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DetectionId:
      name: detectionId
      in: path
      required: true
      description: ID của kết quả detection.
      schema:
        type: string
        minLength: 1
        maxLength: 100

  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
        service:
          type: string
          minLength: 2
          maxLength: 80
          example: ai-vision-service
        time:
          type: string
          format: date-time
          example: '2026-05-17T08:00:00Z'

    ImageSource:
      oneOf:
        - $ref: '#/components/schemas/ImageSourceBase64'
        - $ref: '#/components/schemas/ImageSourceURL'
      discriminator:
        propertyName: sourceType
        mapping:
          BASE64: '#/components/schemas/ImageSourceBase64'
          URL: '#/components/schemas/ImageSourceURL'

    ImageSourceBase64:
      type: object
      additionalProperties: false
      required: [sourceType, data, mimeType]
      properties:
        sourceType:
          type: string
          const: BASE64
        data:
          type: string
          minLength: 1
          description: Dữ liệu ảnh dạng base64.
        mimeType:
          type: string
          enum: [image/jpeg, image/png]
          example: image/jpeg

    ImageSourceURL:
      type: object
      additionalProperties: false
      required: [sourceType, url]
      properties:
        sourceType:
          type: string
          const: URL
        url:
          type: string
          format: uri
          description: URL của ảnh cần phân tích.
          example: https://storage.campus.local/frames/frame-001.jpg

    DetectRequest:
      type: object
      additionalProperties: false
      required: [cameraId, imageSource, correlationId, timestamp]
      properties:
        cameraId:
          type: string
          pattern: '^CAM-[0-9]{3}$'
          description: Mã định danh camera.
          example: CAM-001
        imageSource:
          $ref: '#/components/schemas/ImageSource'
        correlationId:
          type: string
          minLength: 1
          maxLength: 100
          description: ID dùng để trace request.
          example: corr-abc-001
        timestamp:
          type: string
          format: date-time
          description: Thời điểm camera gửi request.

    DetectedObject:
      type: object
      additionalProperties: false
      required: [label, confidence]
      properties:
        label:
          type: string
          enum: [person, vehicle, fire, unknown]
          example: person
        confidence:
          type: number
          minimum: 0
          maximum: 1
          example: 0.95
        boundingBox:
          type: ["object", "null"]
          description: Vị trí object trong ảnh, null nếu không xác định được.
          properties:
            x:
              type: integer
              minimum: 0
            y:
              type: integer
              minimum: 0
            width:
              type: integer
              minimum: 1
            height:
              type: integer
              minimum: 1

    DetectResponse:
      type: object
      additionalProperties: false
      required: [detectionId, cameraId, objects, riskLevel, processedAt]
      properties:
        detectionId:
          type: string
          minLength: 1
          maxLength: 100
          description: ID duy nhất của detection này.
          example: det-0001-uuid
        cameraId:
          type: string
          example: CAM-001
        objects:
          type: array
          minItems: 0
          maxItems: 50
          items:
            $ref: '#/components/schemas/DetectedObject'
        riskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
          description: Mức độ rủi ro do AI đánh giá.
          example: HIGH
        note:
          type: ["string", "null"]
          maxLength: 500
          description: Ghi chú thêm từ AI Vision, null nếu không có.
          example: null
        processedAt:
          type: string
          format: date-time

    ModelInfo:
      type: object
      additionalProperties: false
      required: [modelId, version, supportedLabels, lastUpdated]
      properties:
        modelId:
          type: string
          minLength: 1
          maxLength: 100
          example: yolov8-campus-v2
        version:
          type: string
          example: 2.1.0
        supportedLabels:
          type: array
          minItems: 1
          items:
            type: string
        lastUpdated:
          type: string
          format: date-time

    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          example: https://campus.local/errors/validation
        title:
          type: string
          minLength: 3
          maxLength: 200
          example: Dữ liệu không hợp lệ
        status:
          type: integer
          minimum: 400
          maximum: 599
          example: 400
        detail:
          type: ["string", "null"]
          maxLength: 500
          example: Field cameraId không đúng định dạng
        instance:
          type: ["string", "null"]
          format: uri
          example: https://campus.local/vision/detect
        errors:
          type: array
          minItems: 0
          maxItems: 50
          items:
            type: object
            additionalProperties: false
            required: [field, code, message]
            properties:
              field:
                type: string
                example: cameraId
              code:
                type: string
                example: PATTERN_MISMATCH
              message:
                type: string
                example: cameraId phải có dạng CAM-NNN

  responses:
    BadRequest:
      description: Dữ liệu sai định dạng
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/validation
            title: Dữ liệu không hợp lệ
            status: 400
            detail: Payload không đúng JSON Schema
            instance: https://campus.local/vision/detect
            errors:
              - field: cameraId
                code: PATTERN_MISMATCH
                message: cameraId phải có dạng CAM-NNN

    Unauthorized:
      description: Thiếu hoặc sai thông tin xác thực
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/unauthorized
            title: Chưa xác thực
            status: 401
            detail: Thiếu Bearer token
            instance: https://campus.local/vision/detect
            errors: []

    NotFound:
      description: Resource không tồn tại
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    UnprocessableEntity:
      description: Payload đúng định dạng nhưng không hợp lệ về nghiệp vụ
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    InternalServerError:
      description: Lỗi không mong muốn phía server
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'